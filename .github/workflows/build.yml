name: Build and Release Installers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Build Installer
        run: npm run build:installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Clean up unwanted artifacts
        run: node -e "const fs = require('fs'); const dir = 'installer-release'; if (fs.existsSync(dir)) { fs.readdirSync(dir).forEach(f => { if (f.endsWith('.blockmap') || f.endsWith('.yml')) { fs.unlinkSync(dir + '/' + f); } })}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: installers-${{ matrix.os }}
          path: installer-release/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: installers
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Clock ${{ github.ref_name }}
          files: installers/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
